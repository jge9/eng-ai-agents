<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d" />
  </marker>
  <style>
    .title { font: 600 20px sans-serif; fill: #1f2933; }
    .label { font: 14px sans-serif; fill: #334e68; }
    .small { font: 12px sans-serif; fill: #486581; }
    .box { fill: #ffffff; stroke: #cbd2d9; stroke-width: 1.5; rx: 14; }
    .panel { fill: #f8fafc; stroke: #d9e2ec; stroke-width: 1.2; rx: 18; }
  </style>
</defs>
<rect width="980" height="360" fill="#ffffff" />
<text x="36" y="36" class="title">Patch matching: compare one local neighborhood against a search window</text>
<text x="36" y="62" class="label">We crop a patch around a point in Frame 1, then slide it over nearby candidates in Frame 2 and keep the lowest SSD score.</text>
<rect x="40" y="92" width="270" height="220" class="panel"/>
<rect x="354" y="92" width="270" height="220" class="panel"/>
<rect x="668" y="92" width="270" height="220" class="panel"/>
<text x="60" y="120" class="label">1. Source patch in Frame 1</text>
<text x="374" y="120" class="label">2. Search region in Frame 2</text>
<text x="688" y="120" class="label">3. Best match and motion vector</text>
<rect x="86" y="150" width="170" height="116" fill="#eef2f6" stroke="#9fb3c8" stroke-width="1.5" rx="10"/>
<rect x="136" y="182" width="70" height="52" fill="#8fd3c1" stroke="#2d6a4f" stroke-width="2.5" rx="8"/>
<text x="146" y="252" class="small">template patch</text>
<rect x="400" y="148" width="178" height="120" fill="#eef2f6" stroke="#9fb3c8" stroke-width="1.5" rx="10"/>
<rect x="436" y="172" width="106" height="72" fill="none" stroke="#355c7d" stroke-width="2.5" stroke-dasharray="8 6" rx="10"/>
<rect x="468" y="188" width="70" height="52" fill="#f9f1c7" stroke="#c9a227" stroke-width="2" rx="8"/>
<text x="432" y="284" class="small">all centers inside the dashed box are checked</text>
<rect x="716" y="150" width="170" height="116" fill="#eef2f6" stroke="#9fb3c8" stroke-width="1.5" rx="10"/>
<rect x="768" y="184" width="70" height="52" fill="#8fd3c1" stroke="#2d6a4f" stroke-width="2.5" rx="8"/>
<line x1="742" y1="208" x2="768" y2="208" stroke="#355c7d" stroke-width="3" marker-end="url(#arrow)"/>
<text x="724" y="282" class="small">lowest SSD means most similar appearance</text>
</svg>