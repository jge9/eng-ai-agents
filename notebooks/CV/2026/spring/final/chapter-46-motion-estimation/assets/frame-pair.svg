<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d" />
  </marker>
  <style>
    .title { font: 600 20px sans-serif; fill: #1f2933; }
    .label { font: 14px sans-serif; fill: #334e68; }
    .small { font: 12px sans-serif; fill: #486581; }
    .box { fill: #ffffff; stroke: #cbd2d9; stroke-width: 1.5; rx: 14; }
    .panel { fill: #f8fafc; stroke: #d9e2ec; stroke-width: 1.2; rx: 18; }
  </style>
</defs>
<rect width="980" height="340" fill="#ffffff" />
<text x="36" y="36" class="title">Frame 1 and Frame 2: motion becomes a displacement problem</text>
<text x="36" y="62" class="label">The same objects appear again, but shifted by a known motion vector. We will try to recover that vector from local patches.</text>
<rect x="38" y="86" width="360" height="220" class="panel"/>
<rect x="582" y="86" width="360" height="220" class="panel"/>
<text x="58" y="116" class="label">Frame 1</text>
<text x="602" y="116" class="label">Frame 2</text>
<rect x="88" y="138" width="92" height="68" fill="#8fd3c1" stroke="#2d6a4f" stroke-width="2" rx="8"/>
<rect x="156" y="226" width="118" height="36" fill="#f7b267" stroke="#b45309" stroke-width="2" rx="10"/>
<circle cx="316" cy="186" r="34" fill="#f28482" stroke="#bc4749" stroke-width="2" />
<rect x="252" y="154" width="32" height="32" fill="none" stroke="#355c7d" stroke-width="3" stroke-dasharray="6 5" rx="6"/>
<text x="214" y="148" class="small">tracked patch</text>
<rect x="134" y="114" width="92" height="68" fill="#8fd3c1" stroke="#2d6a4f" stroke-width="2" rx="8"/>
<rect x="202" y="202" width="118" height="36" fill="#f7b267" stroke="#b45309" stroke-width="2" rx="10"/>
<circle cx="362" cy="162" r="34" fill="#f28482" stroke="#bc4749" stroke-width="2" />
<rect x="298" y="130" width="32" height="32" fill="none" stroke="#355c7d" stroke-width="3" stroke-dasharray="6 5" rx="6"/>
<line x1="424" y1="196" x2="548" y2="196" stroke="#355c7d" stroke-width="3" marker-end="url(#arrow)"/>
<text x="436" y="182" class="label">motion: (dx = +46 px, dy = -24 px)</text>
<text x="120" y="288" class="small">x increases to the right</text>
<text x="294" y="288" class="small">y increases downward in image coordinates</text>
</svg>